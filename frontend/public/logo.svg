<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark Background Container -->
  <rect width="800" height="200" rx="24" fill="#0F172A"/>

  <!-- Icon Part (Scale down the binary tree for the banner) -->
  <g transform="translate(100, 150) scale(0.35)">
    <!-- Main Trunk -->
    <path d="M 0,0 L 0,-100" stroke="url(#treeGradientBanner)" stroke-width="24" stroke-linecap="round"/>
    
    <!-- Layer 1 -->
    <g transform="translate(0, -100)">
      <path d="M 0,0 L -80,-80" stroke="url(#treeGradientBanner)" stroke-width="20" stroke-linecap="round"/>
      <path d="M 0,0 L 80,-80" stroke="url(#treeGradientBanner)" stroke-width="20" stroke-linecap="round"/>
      
      <!-- Layer 2 Left -->
      <g transform="translate(-80, -80)">
        <path d="M 0,0 L -50,-60" stroke="url(#treeGradientBanner)" stroke-width="16" stroke-linecap="round"/>
        <path d="M 0,0 L 50,-60" stroke="url(#treeGradientBanner)" stroke-width="16" stroke-linecap="round"/>
        <circle cx="-50" cy="-60" r="12" fill="#14F195"/>
        <circle cx="50" cy="-60" r="12" fill="#14F195"/>
      </g>
      
      <!-- Layer 2 Right -->
      <g transform="translate(80, -80)">
        <path d="M 0,0 L -50,-60" stroke="url(#treeGradientBanner)" stroke-width="16" stroke-linecap="round"/>
        <path d="M 0,0 L 50,-60" stroke="url(#treeGradientBanner)" stroke-width="16" stroke-linecap="round"/>
        <circle cx="-50" cy="-60" r="12" fill="#14F195"/>
        <circle cx="50" cy="-60" r="12" fill="#14F195"/>
      </g>
      <circle cx="0" cy="0" r="10" fill="#9945FF"/>
    </g>
    <circle cx="0" cy="0" r="14" fill="#9945FF"/>
  </g>

  <!-- Text Part -->
  <text x="200" y="130" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="100" fill="#FFFFFF" letter-spacing="-2">SKRIM</text>
  <text x="560" y="130" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="30" fill="#94A3B8" letter-spacing="4">THROWDOWN</text>

  <defs>
    <linearGradient id="treeGradientBanner" x1="0" y1="0" x2="0" y2="-400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9945FF"/>
      <stop offset="1" stop-color="#14F195"/>
    </linearGradient>
  </defs>
</svg>
