<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .tree-part { stroke: #FFFFFF; }
    .node { fill: #FFFFFF; }
    .brand-text { fill: #FFFFFF; }
    .sub-text { fill: #94A3B8; }
    
    @media (prefers-color-scheme: light) {
      .tree-part { stroke: #0F172A; }
      .node { fill: #0F172A; }
      .brand-text { fill: #0F172A; }
      .sub-text { fill: #475569; }
      .bg { fill: #F8FAFC; }
    }
  </style>

  <rect width="800" height="200" rx="24" fill="#0F172A" class="bg"/>

  <g transform="translate(100, 160) scale(0.3)">
    <circle cx="0" cy="0" r="16" class="node"/>
    <path d="M 0,0 L -100,-120" class="tree-part" stroke-width="20" stroke-linecap="round"/>
    <path d="M 0,0 L 100,-120" class="tree-part" stroke-width="20" stroke-linecap="round"/>
    
    <g transform="translate(-100, -120)">
      <circle cx="0" cy="0" r="14" class="node"/>
      <path d="M 0,0 L -60,-100" class="tree-part" stroke-width="16" stroke-linecap="round"/>
      <path d="M 0,0 L 60,-100" class="tree-part" stroke-width="16" stroke-linecap="round"/>
      <circle cx="-60" cy="-100" r="12" class="node"/>
      <circle cx="60" cy="-100" r="12" class="node"/>
    </g>
    
    <g transform="translate(100, -120)">
      <circle cx="0" cy="0" r="14" class="node"/>
      <path d="M 0,0 L -60,-100" class="tree-part" stroke-width="16" stroke-linecap="round"/>
      <path d="M 0,0 L 60,-100" class="tree-part" stroke-width="16" stroke-linecap="round"/>
      <circle cx="-60" cy="-100" r="12" class="node"/>
      <circle cx="60" cy="-100" r="12" class="node"/>
    </g>
  </g>

  <text x="200" y="130" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="100" class="brand-text" letter-spacing="-2">SKRIM</text>
  <text x="560" y="130" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="30" class="sub-text" letter-spacing="4">THROWDOWN</text>
</svg>
