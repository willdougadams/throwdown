<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root { color: #0F172A; }
    @media (prefers-color-scheme: dark) {
      :root { color: #FFFFFF; }
    }
    .tree-part { stroke: currentColor; }
    .node { fill: currentColor; }
  </style>
  
  <rect width="512" height="512" rx="64" fill="#0F172A" class="bg"/>
  <style>
    @media (prefers-color-scheme: dark) { .bg { fill: #0F172A; } }
    @media (prefers-color-scheme: light) { .bg { fill: #F8FAFC; } }
  </style>

  <g transform="translate(256, 400)">
    <!-- Level 0: Root -->
    <circle cx="0" cy="0" r="16" class="node"/>
    
    <!-- Branches L0 -> L1 -->
    <path d="M 0,0 L -100,-120" class="tree-part" stroke-width="20" stroke-linecap="round"/>
    <path d="M 0,0 L 100,-120" class="tree-part" stroke-width="20" stroke-linecap="round"/>
    
    <!-- Level 1 Nodes & Branches L1 -> L2 -->
    <g transform="translate(-100, -120)">
      <circle cx="0" cy="0" r="14" class="node"/>
      <path d="M 0,0 L -60,-100" class="tree-part" stroke-width="16" stroke-linecap="round"/>
      <path d="M 0,0 L 60,-100" class="tree-part" stroke-width="16" stroke-linecap="round"/>
      <circle cx="-60" cy="-100" r="12" class="node"/>
      <circle cx="60" cy="-100" r="12" class="node"/>
    </g>
    
    <g transform="translate(100, -120)">
      <circle cx="0" cy="0" r="14" class="node"/>
      <path d="M 0,0 L -60,-100" class="tree-part" stroke-width="16" stroke-linecap="round"/>
      <path d="M 0,0 L 60,-100" class="tree-part" stroke-width="16" stroke-linecap="round"/>
      <circle cx="-60" cy="-100" r="12" class="node"/>
      <circle cx="60" cy="-100" r="12" class="node"/>
    </g>
  </g>
</svg>
