<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clean background with slightly rounded corners -->
  <rect width="512" height="512" rx="64" fill="#0F172A"/>
  
  <!-- Stylized Binary Tree (Banyan Tree) -->
  <g transform="translate(256, 420)">
    <!-- Main Trunk -->
    <path d="M 0,0 L 0,-100" stroke="url(#treeGradient)" stroke-width="24" stroke-linecap="round"/>
    
    <!-- Layer 1 (Root to L1) -->
    <g transform="translate(0, -100)">
      <path d="M 0,0 L -80,-80" stroke="url(#treeGradient)" stroke-width="20" stroke-linecap="round"/>
      <path d="M 0,0 L 80,-80" stroke="url(#treeGradient)" stroke-width="20" stroke-linecap="round"/>
      
      <!-- Layer 2 (L1 to L2) Left -->
      <g transform="translate(-80, -80)">
        <path d="M 0,0 L -50,-60" stroke="url(#treeGradient)" stroke-width="16" stroke-linecap="round"/>
        <path d="M 0,0 L 50,-60" stroke="url(#treeGradient)" stroke-width="16" stroke-linecap="round"/>
        
        <!-- Fruit/Leaves at Nodes -->
        <circle cx="-50" cy="-60" r="12" fill="#14F195"/>
        <circle cx="50" cy="-60" r="12" fill="#14F195"/>
      </g>
      
      <!-- Layer 2 (L1 to L2) Right -->
      <g transform="translate(80, -80)">
        <path d="M 0,0 L -50,-60" stroke="url(#treeGradient)" stroke-width="16" stroke-linecap="round"/>
        <path d="M 0,0 L 50,-60" stroke="url(#treeGradient)" stroke-width="16" stroke-linecap="round"/>
        
        <!-- Fruit/Leaves at Nodes -->
        <circle cx="-50" cy="-60" r="12" fill="#14F195"/>
        <circle cx="50" cy="-60" r="12" fill="#14F195"/>
      </g>
      
      <!-- Middle Nodes -->
      <circle cx="0" cy="0" r="10" fill="#9945FF"/>
    </g>
    
    <!-- Trunk Base Node -->
    <circle cx="0" cy="0" r="14" fill="#9945FF"/>
  </g>

  <defs>
    <linearGradient id="treeGradient" x1="0" y1="0" x2="0" y2="-400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9945FF"/>
      <stop offset="1" stop-color="#14F195"/>
    </linearGradient>
  </defs>
</svg>
